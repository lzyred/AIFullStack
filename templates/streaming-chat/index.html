<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streaming Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      height: 90vh;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      font-size: 15px;
      color: #333;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user { background: #0071e3; color: white; align-self: flex-end; border-radius: 12px 12px 4px 12px; }
    .assistant { background: #f0f0f0; color: #333; align-self: flex-start; border-radius: 12px 12px 12px 4px; }
    .assistant.streaming::after {
      content: "▋";
      animation: blink 0.7s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }
    textarea {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: none;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      min-height: 42px;
      max-height: 120px;
    }
    textarea:focus { border-color: #0071e3; }
    button {
      padding: 10px 20px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #0058b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .usage { font-size: 11px; color: #aaa; text-align: right; padding: 0 16px 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Streaming Chat — Claude</div>
    <div class="messages" id="messages"></div>
    <div class="usage" id="usage"></div>
    <div class="input-area">
      <textarea
        id="input"
        placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
        rows="1"
      ></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:8000";
    let conversationHistory = [];
    let isStreaming = false;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const usageEl = document.getElementById("usage");

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // Enter to send, Shift+Enter for newline
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function addMessage(role, content) {
      const el = document.createElement("div");
      el.className = `message ${role}`;
      el.textContent = content;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "auto";

      // Add user message
      addMessage("user", text);
      conversationHistory.push({ role: "user", content: text });

      // Create assistant message placeholder
      const assistantEl = addMessage("assistant", "");
      assistantEl.classList.add("streaming");
      let assistantText = "";

      try {
        const response = await fetch(`${API_URL}/chat/stream`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n\n");
          buffer = lines.pop(); // keep incomplete last line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = JSON.parse(line.slice(6));

            if (data.type === "text") {
              assistantText += data.text;
              assistantEl.textContent = assistantText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (data.type === "done") {
              usageEl.textContent = `Tokens: ${data.usage.input_tokens} in, ${data.usage.output_tokens} out`;
            } else if (data.type === "error") {
              assistantEl.textContent = `Error: ${data.message}`;
            }
          }
        }

        conversationHistory.push({ role: "assistant", content: assistantText });

      } catch (err) {
        assistantEl.textContent = `Connection error: ${err.message}`;
      } finally {
        assistantEl.classList.remove("streaming");
        isStreaming = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
